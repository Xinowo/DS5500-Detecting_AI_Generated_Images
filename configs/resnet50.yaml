# ResNet-50 linear-probe configuration
# Head-only training (freeze_backbone: true, unfreeze_last_n_blocks: 0)
# To fine-tune last blocks in the future, increase unfreeze_last_n_blocks (1-4)

# ── Data ──────────────────────────────────────────────────────────────────────
data_root:   "data/train_data"
splits_dir:  "data/splits"
num_workers: 2

# ── Model ─────────────────────────────────────────────────────────────────────
model_name:             "resnet50"
freeze_backbone:        true
unfreeze_last_n_blocks: 0   # 0=head only | 1=layer4 | 2=layer3+4 | ...

# ── Training ──────────────────────────────────────────────────────────────────
epochs:          20
batch_size:      64
lr:              3.0e-4   # head learning rate
backbone_lr:     1.0e-5   # unused in linear-probe mode; for future fine-tuning
weight_decay:    1.0e-2
label_smoothing: 0.1
patience:        5
grad_clip:       1.0
use_amp:         true
eta_min:         1.0e-5
warmup_epochs:   0

# ── Misc ──────────────────────────────────────────────────────────────────────
run_name:    "resnet50-5k-linear-probe"
seed:        42
save_dir:    "checkpoints/resnet50"
outputs_dir: "outputs/resnet50"
